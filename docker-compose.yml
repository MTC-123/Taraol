# SigNoz is rendered from deploy/signoz/casting.yaml by Foundry and committed for
# reproducible `docker compose up` usage. Future layer services belong below.
name: agent-mesh-radar

include:
  - path: ./deploy/signoz/pours/deployment/compose.yaml

services:
  # Persist a local JWT signing key outside version control. This keeps browser
  # sessions valid across restarts and avoids SigNoz's insecure fallback.
  signoz-signoz-0:
    environment:
      SIGNOZ_TOKENIZER_JWT_SECRET: ${SIGNOZ_TOKENIZER_JWT_SECRET:?set in .env}

  # Run the committed static receiver/exporter pipelines directly. The bundled
  # OpAMP manager otherwise starts with a no-op default pipeline before a UI
  # configuration is supplied, which rejects local OTLP traffic.
  ingester:
    command:
      - -c
      - >-
        /signoz-otel-collector migrate sync check &&
        /signoz-otel-collector --config=/etc/otel-collector-config.yaml
        --copy-path=/var/tmp/collector-config.yaml

  planner:
    build:
      context: .
      dockerfile: agents/planner/Dockerfile
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://ingester:4317
      OTEL_SERVICE_NAME: planner
      OTEL_TRACES_SAMPLER: parentbased_always_on
      OTEL_SEMCONV_STABILITY_OPT_IN: gen_ai_latest_experimental
      AMR_LLM: ${AMR_LLM:-fake}
      AMR_MODEL: ${AMR_MODEL:-gpt-4.1-mini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AMR_LLM_ENDPOINT: ${AMR_LLM_ENDPOINT:-}
      AMR_LLM_API_KEY: ${AMR_LLM_API_KEY:-}
      AMR_LOOP_MODE: ${AMR_LOOP_MODE:-off}
      RESEARCHER_A2A_URL: http://researcher:8000/a2a
    ports:
      # The planner is the demo's single host entry point; all later hops stay private.
      - "${AMR_PLANNER_PORT:-8000}:8000"
    networks:
      - signoz-network

  researcher:
    build:
      context: .
      dockerfile: agents/researcher/Dockerfile
    depends_on:
      - planner
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://ingester:4317
      OTEL_SERVICE_NAME: researcher
      OTEL_TRACES_SAMPLER: parentbased_always_on
      OTEL_SEMCONV_STABILITY_OPT_IN: gen_ai_latest_experimental
      AMR_LLM: ${AMR_LLM:-fake}
      AMR_MODEL: ${AMR_MODEL:-gpt-4.1-mini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AMR_LLM_ENDPOINT: ${AMR_LLM_ENDPOINT:-}
      AMR_LLM_API_KEY: ${AMR_LLM_API_KEY:-}
      AMR_LOOP_MODE: ${AMR_LOOP_MODE:-off}
      WRITER_A2A_URL: http://writer:8000/a2a
    networks:
      - signoz-network

  writer:
    build:
      context: .
      dockerfile: agents/writer/Dockerfile
    depends_on:
      - researcher
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://ingester:4317
      OTEL_SERVICE_NAME: writer
      OTEL_TRACES_SAMPLER: parentbased_always_on
      OTEL_SEMCONV_STABILITY_OPT_IN: gen_ai_latest_experimental
      AMR_LLM: ${AMR_LLM:-fake}
      AMR_MODEL: ${AMR_MODEL:-gpt-4.1-mini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AMR_LLM_ENDPOINT: ${AMR_LLM_ENDPOINT:-}
      AMR_LLM_API_KEY: ${AMR_LLM_API_KEY:-}
      AMR_LOOP_MODE: ${AMR_LOOP_MODE:-off}
      CRITIC_A2A_URL: http://critic:8000/a2a
    networks:
      - signoz-network

  critic:
    build:
      context: .
      dockerfile: agents/critic/Dockerfile
    depends_on:
      - writer
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://ingester:4317
      OTEL_SERVICE_NAME: critic
      OTEL_TRACES_SAMPLER: parentbased_always_on
      OTEL_SEMCONV_STABILITY_OPT_IN: gen_ai_latest_experimental
      AMR_LLM: ${AMR_LLM:-fake}
      AMR_MODEL: ${AMR_MODEL:-gpt-4.1-mini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AMR_LLM_ENDPOINT: ${AMR_LLM_ENDPOINT:-}
      AMR_LLM_API_KEY: ${AMR_LLM_API_KEY:-}
      AMR_LOOP_MODE: ${AMR_LOOP_MODE:-off}
      ROUTER_A2A_URL: http://router:8000/a2a
      WRITER_A2A_URL: http://writer:8000/a2a
    networks:
      - signoz-network

  router:
    build:
      context: .
      dockerfile: agents/router/Dockerfile
    depends_on:
      - critic
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://ingester:4317
      OTEL_SERVICE_NAME: router
      OTEL_TRACES_SAMPLER: parentbased_always_on
      OTEL_SEMCONV_STABILITY_OPT_IN: gen_ai_latest_experimental
      AMR_LLM: ${AMR_LLM:-fake}
      AMR_MODEL: ${AMR_MODEL:-gpt-4.1-mini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AMR_LLM_ENDPOINT: ${AMR_LLM_ENDPOINT:-}
      AMR_LLM_API_KEY: ${AMR_LLM_API_KEY:-}
      AMR_LOOP_MODE: ${AMR_LOOP_MODE:-off}
    networks:
      - signoz-network

  loop-watcher:
    build:
      context: .
      dockerfile: detection/Dockerfile
    depends_on:
      - ingester
      - signoz-signoz-0
    environment:
      SIGNOZ_URL: http://signoz-signoz-0:8080
      SIGNOZ_API_KEY: ${SIGNOZ_API_KEY:-}
      # Local-only fallback: avoids the SigNoz UI API key by using the private ClickHouse network.
      SIGNOZ_CLICKHOUSE_URL: http://signoz-telemetrystore-clickhouse-0-0:8123
      OTEL_EXPORTER_OTLP_ENDPOINT: http://ingester:4317
      AMR_LOOP_WINDOW_SEC: ${AMR_LOOP_WINDOW_SEC:-30}
      AMR_LOOP_MAX_REPEATS: ${AMR_LOOP_MAX_REPEATS:-3}
      AMR_BUDGET_USD: ${AMR_BUDGET_USD:-0.01}
      AMR_POLL_INTERVAL_SEC: ${AMR_POLL_INTERVAL_SEC:-5}
      AMR_BUDGET_LOOKBACK_SEC: ${AMR_BUDGET_LOOKBACK_SEC:-3600}
      AMR_SIGNAL_COOLDOWN_SEC: ${AMR_SIGNAL_COOLDOWN_SEC:-60}
    restart: unless-stopped
    networks:
      - signoz-network

  controller:
    build:
      context: .
      dockerfile: detection/Dockerfile
    command: ["uv", "run", "--no-sync", "python", "-m", "detection.controller"]
    depends_on:
      - ingester
      - writer
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://ingester:4317
      AMR_ENFORCE: ${AMR_ENFORCE:-auto}
      AMR_ALERT_COOLDOWN_SEC: ${AMR_ALERT_COOLDOWN_SEC:-60}
      PLANNER_CONTROL_URL: http://planner:8000
      RESEARCHER_CONTROL_URL: http://researcher:8000
      WRITER_CONTROL_URL: http://writer:8000
      CRITIC_CONTROL_URL: http://critic:8000
      ROUTER_CONTROL_URL: http://router:8000
    ports:
      - "${AMR_CONTROLLER_PORT:-8002}:8000"
    restart: unless-stopped
    networks:
      - signoz-network

  signoz-mcp:
    image: signoz/signoz-mcp-server:v0.1.0
    profiles: ["mcp"]
    depends_on:
      - signoz-signoz-0
    environment:
      TRANSPORT_MODE: http
      MCP_SERVER_PORT: 8000
      SIGNOZ_URL: http://signoz-signoz-0:8080
      LOG_LEVEL: info
      OTEL_EXPORTER_OTLP_ENDPOINT: http://ingester:4317
    ports:
      - "${SIGNOZ_MCP_PORT:-8003}:8000"
    networks:
      - signoz-network
